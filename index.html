<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeedHound — Select County</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      text-align: center;
    }
    .brand h1 span { color: #f97316; }
    .brand p { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-top: 6px; }

    .county-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 800px;
    }

    .county-card {
      background: #1a1d27;
      border: 2px solid #2a2d3a;
      border-radius: 10px;
      padding: 28px 36px;
      text-decoration: none;
      color: #e8e8e8;
      transition: border-color 0.15s, background 0.15s;
      min-width: 220px;
      text-align: center;
    }
    .county-card:hover {
      border-color: #f97316;
      background: #1f2233;
    }
    .county-card .name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
    .county-card .state {
      font-size: 0.75rem;
      color: #888;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .county-card .status {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      background: #2a2d3a;
      color: #aaa;
    }
    .county-card .status.active { background: #1a3a1a; color: #4ade80; }
  </style>
</head>
<body>

<div class="brand">
  <h1>Deed<span>Hound</span></h1>
  <p>Motivated Seller Intelligence</p>
</div>

<div class="county-grid">

  <a class="county-card" href="./davidson_tn/">
    <div class="name">Davidson County</div>
    <div class="state">Tennessee</div>
    <div class="status active">Active</div>
  </a>

  <a class="county-card" href="./lubbock_tx/">
    <div class="name">Lubbock County</div>
    <div class="state">Texas</div>
    <div class="status">Manual</div>
  </a>

</div>

</body>
</html>
